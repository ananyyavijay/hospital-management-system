name: CD

on:
  push:
    branches:
      - main
      - 'feature/**'
  workflow_dispatch:

jobs:
  test:
    name: Run tests before deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          APP_ENV: test
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: test
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show target environment
        run: |
          echo "Branch: ${{ github.ref }}"
          echo "Target environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}"

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: hms-app-ananya
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .

      - name: Verify deployment
        run: |
          echo "Waiting for app to restart..."
          sleep 30
          curl -f https://hms-app-ananya.azurewebsites.net/health
          echo "Deployment verified!"